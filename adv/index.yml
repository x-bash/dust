<desc>:
  en: |
    dust is a more intuitive version of du in rust.
    It sorts by file size, uses terminal colors, and provides interactive visualization.
  cn: |
    dust 是 du 的 Rust 实现，功能更强：按大小排序、彩色输出、交互式可视化。

